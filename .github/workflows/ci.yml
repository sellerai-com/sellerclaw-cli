name: CI — lint, type-check & tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + type-check + tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Unit tests
        run: uv run pytest -m unit

  plugin:
    name: Committed plugin matches source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # The Claude Code plugin under plugins/ is generated from plugin/ and committed (the marketplace
      # references it by path). Rebuild it and fail if it drifts from the source tree.
      - name: Rebuild the committed plugin
        run: python3 scripts/build_plugin.py --target claude-code

      - name: Check it is up to date
        run: |
          if ! git diff --quiet -- plugins/; then
            echo "::error::plugins/claude-code is stale — run 'make plugin' and commit the result." >&2
            git diff --stat -- plugins/
            exit 1
          fi
