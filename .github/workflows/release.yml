name: Release — CLI to PyPI

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi
      version:
        description: "Version to stamp into pyproject.toml (no leading 'v')"
        required: true
        default: "0.0.0rc1"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Unit tests
        run: uv run pytest -m unit

  build:
    name: Build wheel + sdist
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+([abrc]+[0-9]+)?$ ]]; then
            echo "::error::version $v is not PEP 440 compatible"; exit 1
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Publishing version $v"

      - name: Stamp version into pyproject.toml
        run: |
          sed -i -E "s/^version = .*/version = \"${{ steps.version.outputs.value }}\"/" pyproject.toml
          head -n 20 pyproject.toml

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sellerclaw-cli
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sellerclaw-cli
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # Cut the GitHub Release for the CLI tag (source archives + changelog) and keep it marked "Latest".
  # The CLI installs from PyPI, so this release carries NO downloadable bundles — the Claude
  # plugin/connector artifacts are published independently by .github/workflows/publish-plugin.yml to
  # the rolling `plugin-latest` release:
  #   https://github.com/sellerai-com/sellerclaw-cli/releases/download/plugin-latest/sellerclaw.mcpb
  #   https://github.com/sellerai-com/sellerclaw-cli/releases/download/plugin-latest/sellerclaw-claude-web.zip
  github-release:
    name: Cut the CLI GitHub release
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create the release (latest)
        uses: softprops/action-gh-release@v3
        with:
          name: CLI ${{ github.ref_name }}
          body: |
            `sellerclaw-cli` ${{ github.ref_name }} — the command-line client and MCP server for the SellerClaw Agent API.

            **Install:** `pip install sellerclaw-cli` (or run it with `uvx sellerclaw-cli`). Published to PyPI: https://pypi.org/project/sellerclaw-cli/

            Looking for the **Claude plugin / connector** (Desktop `.mcpb` and claude-web `.zip`)? It ships separately — grab it from the [`plugin-latest`](https://github.com/sellerai-com/sellerclaw-cli/releases/tag/plugin-latest) release.
          make_latest: true
