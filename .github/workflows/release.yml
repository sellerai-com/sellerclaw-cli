name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi
      version:
        description: "Version to stamp into pyproject.toml (no leading 'v')"
        required: true
        default: "0.0.0rc1"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Unit tests
        run: uv run pytest -m unit

  build:
    name: Build wheel + sdist
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Determine version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
          fi
          if [[ ! "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+([abrc]+[0-9]+)?$ ]]; then
            echo "::error::version $v is not PEP 440 compatible"; exit 1
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"
          echo "Publishing version $v"

      - name: Stamp version into pyproject.toml
        run: |
          sed -i -E "s/^version = .*/version = \"${{ steps.version.outputs.value }}\"/" pyproject.toml
          head -n 20 pyproject.toml

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sellerclaw-cli
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sellerclaw-cli
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # Build the click-to-install downloads and attach them to the GitHub Release so non-technical
  # users get stable URLs:
  #   https://github.com/sellerai-com/sellerclaw-cli/releases/latest/download/sellerclaw.mcpb
  #   https://github.com/sellerai-com/sellerclaw-cli/releases/latest/download/sellerclaw-claude-web.zip
  # The Desktop bundle launches `sellerclaw-cli[mcp]@latest` via uvx; the web .zip is uploaded by hand
  # at claude.ai (Customize -> Personal plugins -> Upload plugin) and points at the hosted connector.
  publish-mcpb:
    name: Attach Desktop .mcpb and web .zip to GitHub Release
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # The bundles carry the *plugin* version (plugin/VERSION), not the CLI tag — the plugin is
      # versioned independently (see .github/workflows/publish-plugin.yml). We still rebuild and
      # re-attach them on a CLI release so releases/latest/download/... always resolves to a release
      # that carries the bundles, whichever release happens to be latest.
      - name: Assemble the desktop bundle (plugin version)
        run: |
          set -euo pipefail
          python3 scripts/build_plugin.py --target claude-desktop
          grep '"version"' dist/plugins/claude-desktop/manifest.json

      - name: Build .mcpb bundle
        run: npx -y @anthropic-ai/mcpb pack dist/plugins/claude-desktop dist/sellerclaw.mcpb

      - name: Pack the claude-web upload bundle (.zip)
        run: |
          set -euo pipefail
          python3 scripts/build_plugin.py --target claude-web --zip dist/sellerclaw-claude-web.zip
          ls -l dist/sellerclaw-claude-web.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            dist/sellerclaw.mcpb
            dist/sellerclaw-claude-web.zip
          fail_on_unmatched_files: true
